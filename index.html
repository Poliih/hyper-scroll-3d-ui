<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>HYPER SCROLL // REVELATION</title>
    
    <link rel="icon" type="image/png" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script src="script.js" defer></script>
</head>

<body>

    <div class="cyber-grid"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="noise"></div>

    <div class="hud">
        <div class="hud-top">
            <span class="blink-text">SYS.ONLINE // NEURAL LINK ACTIVE</span>
            <div class="hud-line"></div>
            <span>FPS: <strong id="fps" class="neon-text-blue">60</strong></span>
        </div>

        <div class="center-nav">
            VELOCITY_STRESS // <strong id="vel-readout" class="neon-text-red">0.00</strong>
        </div>

        <div class="hud-bottom">
            <span>COORD: <strong id="coord" class="neon-text-yellow">000.000</strong></span>
            <div class="hud-line"></div>
            <span>V. 2.0.77</span>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <div class="world" id="world"></div>
    </div>

    <div class="scroll-proxy"></div>

</body>
</html>
